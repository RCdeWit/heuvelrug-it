# Coturn TURN server configuration for Nextcloud Talk
# See: https://nextcloud-talk.readthedocs.io/en/latest/TURN/

# Network settings
listening-port=3478
tls-listening-port=5349

# Use fingerprint in TURN message
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Realm (your domain)
realm=turn.{{ domain }}

# Static auth secret (shared with Nextcloud Talk settings)
# Generate with: openssl rand -hex 32
static-auth-secret={{ turn_secret }}

# Total allocation quota (max concurrent connections)
total-quota=100

# Per-user allocation quota
user-quota=10

# Max bandwidth per session (in bytes per second, 0 = unlimited)
max-bps=0

# Relay port range - smaller range is more secure and easier to firewall
min-port=49152
max-port=49252

# Disable multicast peers (security)
no-multicast-peers

# Disable CLI (not needed in container)
no-cli

# Log to stdout for Docker
log-file=stdout

# Verbose logging (disable in production if needed)
verbose

# Enable STUN
stun-only=false

# Allowed peer IPs (restrict to public IPs)
# Deny private/loopback ranges for security
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255
