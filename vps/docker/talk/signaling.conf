# Nextcloud Talk High Performance Backend (HPB) Configuration
# See: https://github.com/strukturag/nextcloud-spreed-signaling

[http]
# HTTP listener address
listen = 0.0.0.0:8080

[app]
# Enable debug logging (disable in production)
debug = false

[sessions]
# Session hash key (minimum 16 bytes for AES-128)
# Generate with: openssl rand -hex 16
hashkey = {{ signaling_hashkey }}

# Session block key (16 bytes for AES-128, 32 bytes for AES-256)
# Generate with: openssl rand -hex 16
blockkey = {{ signaling_blockkey }}

[clients]
# Token type to expect from clients
tokentype = static

[backend]
# Backends allowed to connect
# Use shared secret authentication
backends = backend-1

# Shared secret for backend authentication
# This must match what you configure in Nextcloud Talk settings
secret = {{ signaling_secret }}

# Allow all backend URLs (will be validated by shared secret)
allowall = false

[backend-1]
# URL of your Nextcloud instance
url = https://drive.{{ domain }}

# Shared secret (same as above)
secret = {{ signaling_secret }}

[nats]
# NATS server URL for internal messaging
url = nats://nats:4222

[mcu]
# MCU type (janus for WebRTC media)
type = janus

# Janus gateway WebSocket URL
url = ws://janus:8188

# Janus API secret (must match api_secret in janus.jcfg)
# Disabled - api_secret not used currently
# apikey = {{ janus_api_secret }}

[turn]
# TURN is configured in Nextcloud Talk settings directly (via entrypoint script)
# The signaling server doesn't need its own TURN config since Nextcloud
# provides TURN credentials to clients through the authenticated Talk session.
#
# If you want the signaling server to generate TURN credentials directly,
# uncomment and configure the following:
# apikey = <turn_rest_api_key from janus.jcfg>
# servers = turn:turn.{{ domain }}:3478?transport=udp,turn:turn.{{ domain }}:3478?transport=tcp
# secret = {{ turn_secret }}
