# NATS Server Configuration for Nextcloud Talk Signaling
# See: https://docs.nats.io/running-a-nats-service/configuration

# Listen on all interfaces
listen: 0.0.0.0:4222

# Logging
debug: false
trace: false
logtime: true

# Maximum message payload (1MB should be sufficient)
max_payload: 1048576

# Maximum connections
max_connections: 1000
